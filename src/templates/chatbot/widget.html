<!--
  Floating chatbot widget — included by base.html for logged-in operators.
  Owner: H.G.P.C. Sagara (PM & Integration Dev)
-->
<button id="chatbot-toggle" class="btn btn-primary rounded-circle shadow"
        title="Ask the assistant" aria-label="Open assistant">💬</button>

<div id="chatbot-panel" class="card shadow d-none">
  <div class="card-header text-white d-flex justify-content-between align-items-center"
       style="background-color:#1F3864;">
    <span>🍃 Assistant</span>
    <button type="button" class="btn-close btn-close-white" id="chatbot-close"
            aria-label="Close assistant"></button>
  </div>
  <div id="chatbot-messages" class="card-body">
    <div class="chatbot-msg chatbot-msg-bot">
      Hello! Ask me anything about the system — for example
      <em>"Why was a weight flagged?"</em> or
      <em>"How much tea did we collect today?"</em>
    </div>
  </div>
  <div class="card-footer p-2">
    <form id="chatbot-form" class="d-flex gap-2">
      <input id="chatbot-input" class="form-control form-control-sm"
             type="text" maxlength="500" autocomplete="off"
             placeholder="Type your question…">
      <button class="btn btn-sm btn-primary" type="submit">Send</button>
    </form>
  </div>
</div>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
