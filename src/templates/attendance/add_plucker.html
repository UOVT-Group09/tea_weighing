<!DOCTYPE html>
<html>
<head>
    <title>Add Plucker</title>
</head>
<body>

<h2>Add New Plucker</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name"><br><br>

    <label>Daily Rate:</label><br>
    <input type="number" step="0.01" name="daily_rate"><br><br>

    <button type="submit">Add</button>
</form>

<br>
<a href="{{ url_for('attendance.index') }}">Back</a>

</body>
</html>
