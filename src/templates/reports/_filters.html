{# Shared date-range + farmer filters for Reports & Trend #}
<form method="get" class="card shadow-sm mb-4 report-filters">
  <div class="card-body">
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label" for="start">From</label>
        <input type="date" class="form-control" id="start" name="start"
               max="{{ today }}" value="{{ start.isoformat() }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label" for="end">To</label>
        <input type="date" class="form-control" id="end" name="end"
               max="{{ today }}" value="{{ end.isoformat() }}" required>
      </div>
      {% if show_farmer|default(true) %}
      <div class="col-md-3">
        <label class="form-label" for="farmer_id">Farmer</label>
        <select class="form-select" id="farmer_id" name="farmer_id">
          <option value="">All farmers</option>
          {% for f in farmers %}
            <option value="{{ f.farmer_id }}" {% if f.farmer_id == farmer_id %}selected{% endif %}>
              {{ f.name }}
            </option>
          {% endfor %}
        </select>
      </div>
      {% endif %}
      <div class="col-md-3">
        <button type="submit" class="btn text-white w-100" style="background-color:#548235;">
          Apply filters
        </button>
      </div>
    </div>
    <div class="d-flex flex-wrap gap-2 mt-3 align-items-center">
      <span class="text-muted small">Quick range:</span>
      <button type="button" class="btn btn-sm btn-outline-secondary preset-range" data-days="6">Last 7 days</button>
      <button type="button" class="btn btn-sm btn-outline-secondary preset-range" data-days="13">Last 14 days</button>
      <button type="button" class="btn btn-sm btn-outline-secondary preset-range" data-days="29">Last 30 days</button>
    </div>
    <p class="text-muted small mb-0 mt-2">
      {{ start.strftime('%d %b %Y') }} – {{ end.strftime('%d %b %Y') }}
      {% if selected_farmer %} · {{ selected_farmer.name }}
      {% elif not farmer_id %} · all farmers{% endif %}
    </p>
  </div>
</form>
