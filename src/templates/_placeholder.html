{% extends "base.html" %}
{% block title %}{{ module }}{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body text-center py-5">
    <h3 style="color:#1F3864;">{{ module }}</h3>
    <p class="text-muted">This module is wired into the app and ready for its owner.</p>
    <p><span class="badge bg-secondary">Owner: {{ owner }}</span></p>
    <p class="small text-muted mt-3 mb-0"><strong>To build:</strong> {{ todo }}</p>
  </div>
</div>
{% endblock %}
